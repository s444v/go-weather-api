<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,regular,500,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="static/style.css">
    <title>styopa</title>
</head>
<body>
    <section>
        <img src={{.Picture}} width = '200px'>
    <form
        enctype="multipart/form-data"
        action="http://localhost:8080"
        method="get"
        >
        <div class="weather">
            <h1 class="title">{{.Country}}</h1>
            <div class="weather__data">
                <div class="text">Температура:</div>
                <div class="response">{{.Temperature}}</div>
                <div class="text">Влажность:</div>
                <div class="response">{{.Humidity}}%</div>
            </div>
        </div>
        <button>Назад</button>
    </form>
    </section>
</body>
</html>
